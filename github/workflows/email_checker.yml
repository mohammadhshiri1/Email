name: Email Checker

# این بخش مشخص می‌کند که workflow چه زمانی اجرا شود
on:
  # اجرای دستی از طریق تب Actions در گیت‌هاب
  workflow_dispatch:
  # اجرای خودکار بر اساس زمان‌بندی (مثلاً هر روز ساعت ۹ صبح)
  # schedule:
  #   - cron: '0 9 * * *'  # زمان‌بندی به وقت UTC است

jobs:
  check-emails:
    runs-on: ubuntu-latest
    steps:
      # 1. دریافت کدها از مخزن
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. نصب پایتون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. نصب وابستگی‌ها (در صورت نیاز)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # اگر کتابخانه خاصی نیاز دارید، می‌توانید آن را اینجا اضافه کنید
          # pip install -r requirements.txt

      # 4. اجرای اسکریپت پایتون
      - name: Run email checker script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python your_script_name.py # نام فایل اسکریپت خود را جایگزین کنید
